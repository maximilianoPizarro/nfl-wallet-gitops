# Prometheus datasource for Istio/mesh metrics (Stadium Wallet east/west).
# Hub: promxy-acm-observability on cluster-rddww.dynamic.redhatworkshops.io. If 401: use grafana-datasource-prometheus-bearer-token.yaml.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-istio
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: nfl-wallet
  datasource:
    name: Prometheus
    type: prometheus
    access: proxy
    url: "https://promxy-acm-observability.apps.cluster-rddww.dynamic.redhatworkshops.io"
    isDefault: true
    uid: prometheus
    jsonData:
      timeInterval: "15s"
      httpMethod: GET
      disableMetricsLookup: true
      tlsSkipVerify: true

# ---------------------------------------------------------------------------
# NFL Wallet - ApplicationSet con clusterDecisionResource (ACM)
# ---------------------------------------------------------------------------
# Usa Kustomize (nfl-wallet/overlays) en lugar de Helm.
# Requiere que el chart nfl-wallet esté desplegado por separado (Gateway, webapp, etc.).
#
# Prerrequisitos:
#   1. argocd-placement-configmap.yaml (ConfigMap acm-placement)
#   2. app-nfl-wallet-acm.yaml (Placements + GitOpsCluster)
#   3. argocd-applicationset-rbac-placement.yaml (RBAC para PlacementDecision)
#
# Matrix: clusterDecisionResource × list → 6 Applications
#   (dev-east, dev-west, test-east, test-west, prod-east, prod-west)
#
# Dominios: east/west en overlays dev-east, dev-west, etc. Editar si cambian.
# ---------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nfl-wallet
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - matrix:
        generators:
          - clusterDecisionResource:
              configMapRef: acm-placement
              requeueAfterSeconds: 60
              labelSelector:
                matchLabels:
                  cluster.open-cluster-management.io/placement: nfl-wallet-gitops-placement
          - list:
              elements:
                - appName: nfl-wallet
                  namespace: nfl-wallet-dev
                  path: nfl-wallet/overlays/dev-east
                  pathWest: nfl-wallet/overlays/dev-west
                  env: dev
                - appName: nfl-wallet
                  namespace: nfl-wallet-test
                  path: nfl-wallet/overlays/test-east
                  pathWest: nfl-wallet/overlays/test-west
                  env: test
                - appName: nfl-wallet
                  namespace: nfl-wallet-prod
                  path: nfl-wallet/overlays/prod-east
                  pathWest: nfl-wallet/overlays/prod-west
                  env: prod
  template:
    metadata:
      name: '{{.appName}}-{{.namespace}}-{{.clusterName}}'
      labels:
        velero.io/exclude-from-backup: "true"
        app.kubernetes.io/part-of: application-lifecycle
        app.kubernetes.io/managed-by: argocd
        apps.open-cluster-management.io/cluster-set: global
        cluster.open-cluster-management.io/placement: 'nfl-wallet-{{.env}}-{{.clusterName}}-placement'
    spec:
      project: default
      source:
        repoURL: https://github.com/maximilianoPizarro/nfl-wallet-gitops.git
        targetRevision: main
        path: '{{ if eq .clusterName "east" }}{{.path}}{{ else }}{{.pathWest}}{{ end }}'
      destination:
        name: "{{.clusterName}}"
        namespace: "{{.namespace}}"
      ignoreDifferences:
        - group: route.openshift.io
          kind: Route
          jqPathExpressions:
            - .status
          jsonPointers:
            - /metadata/resourceVersion
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/template/metadata/annotations
            - /metadata/annotations
            - /metadata/resourceVersion
          jqPathExpressions:
            - .status
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP
            - /spec/clusterIPs
        - group: ""
          kind: Secret
          jsonPointers:
            - /metadata/resourceVersion
        - group: ""
          kind: ConfigMap
          jsonPointers:
            - /metadata/resourceVersion
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jqPathExpressions:
            - .status
        - group: networking.kuadrant.io
          kind: HTTPRoute
          jqPathExpressions:
            - .status
        - group: kuadrant.io
          kind: AuthPolicy
          jqPathExpressions:
            - .status
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true

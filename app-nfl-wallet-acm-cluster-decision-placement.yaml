# ---------------------------------------------------------------------------
# NFL Wallet - ApplicationSet con clusterDecisionResource (ACM Placement)
# ---------------------------------------------------------------------------
# Genera 6 Applications desde PlacementDecision (clusters dinámicos).
# Requiere: argocd-placement-configmap.yaml (kind: placementdecisions),
# argocd-applicationset-rbac-placement.yaml, app-nfl-wallet-acm.yaml
#
# Si clusterDecisionResource falla con "could not find the requested resource",
# usa app-nfl-wallet-acm-cluster-decision.yaml (list generator).
# ---------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nfl-wallet
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - matrix:
        generators:
          - clusterDecisionResource:
              configMapRef: acm-placement
              requeueAfterSeconds: 60
              labelSelector:
                matchLabels:
                  cluster.open-cluster-management.io/placement: nfl-wallet-gitops-placement
          - list:
              elements:
                - appName: nfl-wallet
                  namespace: nfl-wallet-dev
                  path: nfl-wallet/overlays/dev-east
                  pathWest: nfl-wallet/overlays/dev-west
                  env: dev
                - appName: nfl-wallet
                  namespace: nfl-wallet-test
                  path: nfl-wallet/overlays/test-east
                  pathWest: nfl-wallet/overlays/test-west
                  env: test
                - appName: nfl-wallet
                  namespace: nfl-wallet-prod
                  path: nfl-wallet/overlays/prod-east
                  pathWest: nfl-wallet/overlays/prod-west
                  env: prod
  template:
    metadata:
      name: '{{.appName}}-{{.namespace}}-{{.clusterName}}'
      labels:
        velero.io/exclude-from-backup: "true"
        app.kubernetes.io/part-of: application-lifecycle
        app.kubernetes.io/managed-by: argocd
        apps.open-cluster-management.io/cluster-set: global
        cluster.open-cluster-management.io/placement: 'nfl-wallet-{{.env}}-{{.clusterName}}-placement'
    spec:
      project: default
      sources:
        - repoURL: https://maximilianopizarro.github.io/NFL-Wallet
          chart: nfl-wallet
          targetRevision: "0.1.1"
          helm:
            releaseName: nfl-wallet
            values: |
              gateway:
                enabled: true
                route:
                  enabled: false
                hostnames:
                  - nfl-wallet-{{.env}}.apps.cluster-{{ if eq .clusterName "east" }}thmg4.thmg4.sandbox4076.opentlc.com{{ else }}2tjvj.2tjvj.sandbox5367.opentlc.com{{ end }}
              webapp:
                route:
                  enabled: false
              waypoint:
                enabled: {{ if eq .env "dev" }}false{{ else }}true{{ end }}
        - repoURL: https://github.com/maximilianoPizarro/nfl-wallet-gitops.git
          targetRevision: main
          path: '{{ if eq .clusterName "east" }}{{.path}}{{ else }}{{.pathWest}}{{ end }}'
      destination:
        name: "{{.clusterName}}"
        namespace: "{{.namespace}}"
      ignoreDifferences:
        - group: route.openshift.io
          kind: Route
          jqPathExpressions:
            - .status
          jsonPointers:
            - /metadata/resourceVersion
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - .status
          jsonPointers:
            - /spec/template/metadata/annotations
            - /metadata/annotations
            - /metadata/resourceVersion
        - group: ""
          kind: Service
          jsonPointers:
            - /spec.clusterIP
            - /spec.clusterIPs
        - group: ""
          kind: Secret
          jsonPointers:
            - /metadata/resourceVersion
        - group: ""
          kind: ConfigMap
          jsonPointers:
            - /metadata/resourceVersion
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jqPathExpressions:
            - .status
        - group: networking.kuadrant.io
          kind: HTTPRoute
          jqPathExpressions:
            - .status
        - group: kuadrant.io
          kind: AuthPolicy
          jqPathExpressions:
            - .status
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true

# PodMonitor (RHOBS/COO): NFL Wallet prod gateway pods (Envoy stats on 15090).
apiVersion: monitoring.rhobs/v1
kind: PodMonitor
metadata:
  name: nfl-wallet-prod-gateway-pods
  namespace: openshift-cluster-observability-operator
  labels:
    app.kubernetes.io/component: gateway
    openshift.io/user-monitoring: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: gateway
    matchExpressions:
      - key: gateway.networking.k8s.io/gateway-name
        operator: In
        values:
          - nfl-wallet-gateway
          - nfl-wallet-gateway-istio
  namespaceSelector:
    matchNames:
      - nfl-wallet-prod
  podMetricsEndpoints:
    - port: http-envoy-prom
      path: /stats/prometheus
      interval: 30s

# ---------------------------------------------------------------------------
# Stadium Wallet - ApplicationSet para cluster West (sin ACM)
# ---------------------------------------------------------------------------
# Genera 3 Applications (dev, test, prod) con Kustomize.
# Editar server para apuntar al cluster west.
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nfl-wallet-west
  namespace: openshift-gitops
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - path: nfl-wallet/overlays/dev
                  namespace: nfl-wallet-dev
                - path: nfl-wallet/overlays/test
                  namespace: nfl-wallet-test
                - path: nfl-wallet/overlays/prod
                  namespace: nfl-wallet-prod
          - list:
              elements:
                - server: https://api.cluster-4q4c7.4q4c7.sandbox3802.opentlc.com:6443  # West cluster API
  template:
    metadata:
      name: "nfl-wallet-west-{{namespace}}"
      labels:
        app.kubernetes.io/part-of: application-lifecycle
        app.kubernetes.io/managed-by: argocd
        cluster: west
    spec:
      project: default
      source:
        repoURL: https://github.com/maximilianoPizarro/nfl-wallet-gitops.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: "{{server}}"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true

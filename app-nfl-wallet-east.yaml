# ---------------------------------------------------------------------------
# NFL Wallet - ApplicationSet para cluster East (sin ACM)
# ---------------------------------------------------------------------------
# Genera 3 Applications (dev, test, prod) con Kustomize.
# Editar server para apuntar al cluster east.
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nfl-wallet-east
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
          - path: nfl-wallet/overlays/dev
            namespace: nfl-wallet-dev
          - path: nfl-wallet/overlays/test
            namespace: nfl-wallet-test
          - path: nfl-wallet/overlays/prod
            namespace: nfl-wallet-prod
  template:
    metadata:
      name: "nfl-wallet-east-{{namespace}}"
      labels:
        app.kubernetes.io/part-of: application-lifecycle
        app.kubernetes.io/managed-by: argocd
        cluster: east
    spec:
      project: default
      source:
        repoURL: https://github.com/maximilianoPizarro/nfl-wallet-gitops.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc  # in-cluster; editar para cluster remoto
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true

# API keys for AuthPolicy and RateLimitPolicy. AuthPolicy looks for Secrets with label api: nfl-wallet-test.
# RateLimitPolicy expects keys api-key-bills, api-key-customers, api-key-raiders in nfl-wallet-api-keys.
# Header: X-Api-Key: <value>
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys
  namespace: nfl-wallet-test
  labels:
    api: nfl-wallet-test
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-test-key"
  api-key-bills: "nfl-wallet-bills-key"
  api-key-customers: "nfl-wallet-customers-key"
  api-key-raiders: "nfl-wallet-raiders-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-customers
  namespace: nfl-wallet-test
  labels:
    api: nfl-wallet-test
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-customers-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-bills
  namespace: nfl-wallet-test
  labels:
    api: nfl-wallet-test
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-bills-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-raiders
  namespace: nfl-wallet-test
  labels:
    api: nfl-wallet-test
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-raiders-key"
---
# ESPN API - API Product nfl-wallet-api-espn (Developer Hub)
# Keys generadas desde Kuadrant/API Products; esta es la key inicial para pruebas
# AuthPolicy acepta: devportal.kuadrant.io/apiproduct O app (matchLabels requiere ambos si se listan)
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-espn
  namespace: nfl-wallet-test
  labels:
    app: nfl-wallet-api-espn
    devportal.kuadrant.io/apiproduct: nfl-wallet-api-espn
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:

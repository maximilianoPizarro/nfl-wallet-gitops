# Dev overlay para cluster west (ACM)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nfl-wallet-dev

resources:
  - ../../base
  - namespace-mesh.yaml

patches:
  - target:
      kind: Route
      name: nfl-wallet-gateway
    patch: |-
      - op: replace
        path: /spec/host
        value: nfl-wallet-dev.apps.cluster-4q4c7.4q4c7.sandbox3802.opentlc.com

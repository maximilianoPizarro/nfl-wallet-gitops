# AuthPolicy override: require API key only for /api-bills, /api-customers, /api-raiders (excl. swagger/api-docs). Frontend and Swagger allow anonymous.
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: nfl-wallet-prod-auth
  namespace: nfl-wallet-prod
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: nfl-wallet-gateway
  rules:
    authentication:
      "anonymous":
        priority: 1
        when:
          - predicate: 'request.method == "OPTIONS" || request.path.contains("swagger") || request.path.contains("api-docs") || request.path.endsWith("/swagger") || request.path == "/swagger" || (!request.path.startsWith("/api-bills") && !request.path.startsWith("/api-customers") && !request.path.startsWith("/api-raiders"))'
        anonymous: {}
      "api-key":
        priority: 0
        when:
          - predicate: 'request.method != "OPTIONS" && !(request.path.contains("swagger") || request.path.contains("api-docs") || request.path.endsWith("/swagger") || request.path == "/swagger") && (request.path.startsWith("/api-bills") || request.path.startsWith("/api-customers") || request.path.startsWith("/api-raiders"))'
        apiKey:
          selector:
            matchLabels:
              api: nfl-wallet-prod
          allNamespaces: true
        credentials:
          customHeader:
            name: X-Api-Key

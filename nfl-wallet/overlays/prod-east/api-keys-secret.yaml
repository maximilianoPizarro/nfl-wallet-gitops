# API keys for AuthPolicy and RateLimitPolicy. AuthPolicy looks for Secrets with label api: nfl-wallet-prod.
# RateLimitPolicy expects keys api-key-bills, api-key-customers, api-key-raiders in nfl-wallet-api-keys.
# Replace values before commit, or use Sealed Secrets / External Secrets.
# Header: X-Api-Key:
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys
  namespace: nfl-wallet-prod
  labels:
    api: nfl-wallet-prod
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-prod-key"
  api-key-bills: "nfl-wallet-bills-key"
  api-key-customers: "nfl-wallet-customers-key"
  api-key-raiders: "nfl-wallet-raiders-key"
---
# Optional: separate keys per API (customers, bills, raiders)
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-customers
  namespace: nfl-wallet-prod
  labels:
    api: nfl-wallet-prod
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-customers-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-bills
  namespace: nfl-wallet-prod
  labels:
    api: nfl-wallet-prod
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-bills-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: nfl-wallet-api-keys-raiders
  namespace: nfl-wallet-prod
  labels:
    api: nfl-wallet-prod
    kuadrant.io/managed-by: authorino
    authorino.kuadrant.io/managed-by: authorino
stringData:
  api_key: "nfl-wallet-raiders-key"

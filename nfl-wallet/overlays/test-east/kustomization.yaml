# Test overlay para cluster east (ACM)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nfl-wallet-test

resources:
  - ../../base
  - api-keys-secret.yaml
  - auth-policy-patch.yaml
  - namespace-mesh.yaml
  - nfl-wallet-espn-route.yaml
  - plan-policy.yaml
  - telemetry-waypoint.yaml

patches:
  - target:
      kind: Route
      name: nfl-wallet-gateway
    patch: |-
      - op: replace
        path: /spec/host
        value: nfl-wallet-test.apps.cluster-4cspb.4cspb.sandbox1414.opentlc.com

# PlanPolicy for NFL Wallet API Raiders (test) - populates status.discoveredPlans
# APIProduct nfl-wallet-api-raiders is registered in nfl-wallet-test
---
# PlanPolicy for ESPN API (test) - API Product nfl-wallet-api-espn
apiVersion: extensions.kuadrant.io/v1alpha1
kind: PlanPolicy
metadata:
  name: nfl-wallet-api-espn-plans
  namespace: nfl-wallet-test
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: nfl-wallet-espn-route
  plans:
    - tier: gold
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "gold"
      limits:
        daily: 1000
    - tier: silver
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "silver"
      limits:
        daily: 500
    - tier: bronze
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "bronze"
      limits:
        daily: 100
---
apiVersion: extensions.kuadrant.io/v1alpha1

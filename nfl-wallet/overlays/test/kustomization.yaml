apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nfl-wallet-test

# Gateway route only; canary in prod only (host is cluster-wide)
resources:
  - ../../base
  - api-keys-secret.yaml
  - auth-policy-patch.yaml
  - namespace-mesh.yaml
  - nfl-wallet-espn-route.yaml
  - plan-policy.yaml
  - telemetry-waypoint.yaml

patches:
  - target:
      kind: Route
      name: nfl-wallet-gateway
    patch: |-
      - op: replace
        path: /spec/host
        value: nfl-wallet-test.apps.cluster-thmg4.thmg4.sandbox4076.opentlc.com
